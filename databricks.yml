bundle:
  name: taxi_mlops

variables:
  catalog:
    description: Unity Catalog catalog name
    default: main
  schema:
    description: Unity Catalog schema name
    default: default

targets:
  dev:
    default: true
    workspace:
      # If host is omitted, Databricks CLI uses DATABRICKS_HOST environment variable automatically.
      root_path: /Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

resources:
  jobs:
    taxi_mlops_job:
      name: taxi_mlops_job
      tasks:
        - task_key: ingest
          notebook_task:
            notebook_path: ./notebooks/01_ingest.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
          environment_key: default

        - task_key: train
          depends_on:
            - task_key: ingest
          notebook_task:
            notebook_path: ./notebooks/03_train.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
          environment_key: default

        - task_key: evaluate
          depends_on:
            - task_key: train
          notebook_task:
            notebook_path: ./notebooks/04_evaluate.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
          environment_key: default

        - task_key: inference
          depends_on:
            - task_key: evaluate
          notebook_task:
            notebook_path: ./notebooks/05_inference.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
          environment_key: default

        - task_key: monitor
          depends_on:
            - task_key: inference
          notebook_task:
            notebook_path: ./notebooks/06_monitor.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
          environment_key: default

      environments:
        - environment_key: default
          spec:
            client: default
            environment_version: '2'

  quality_monitors:
    nyctaxi_monitor:
      table_name: ${var.catalog}.${var.schema}.nyctaxi_inference
      assets_dir: /Shared/taxi_mlops_monitoring
      output_schema_name: ${var.catalog}.${var.schema}
      inference_log:
        problem_type: PROBLEM_TYPE_REGRESSION
        prediction_col: prediction
        label_col: fare_amount
        timestamp_col: pickup_datetime
        model_id_col: model_id
        granularities: [ "1 day" ]
