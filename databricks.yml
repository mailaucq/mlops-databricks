bundle:
  name: taxi_mlops

variables:
  catalog:
    description: Unity Catalog catalog name
    default: main
  schema:
    description: Unity Catalog schema name
    default: default
  experiment_name:
    description: MLflow Experiment Name
    default: "/Shared/taxi_mlops_experiment"


targets:
  dev:
    default: true
    workspace:
      # If host is omitted, Databricks CLI uses DATABRICKS_HOST environment variable automatically.
      root_path: /Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

resources:
  jobs:
    taxi_mlops_job:
      name: taxi_mlops_job
      tasks:
        - task_key: ingest
          notebook_task:
            notebook_path: ./notebooks/01_ingest.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
          environment_key: default

        - task_key: train
          depends_on:
            - task_key: ingest
          notebook_task:
            notebook_path: ./notebooks/03_train.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              experiment_name: ${var.experiment_name}
          environment_key: default

        - task_key: evaluate
          depends_on:
            - task_key: train
          notebook_task:
            notebook_path: ./notebooks/04_evaluate.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
          environment_key: default

        - task_key: inference
          depends_on:
            - task_key: evaluate
          notebook_task:
            notebook_path: ./notebooks/05_inference.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
          environment_key: default

        - task_key: monitor
          depends_on:
            - task_key: inference
          notebook_task:
            notebook_path: ./notebooks/06_monitor.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
          environment_key: default

      environments:
        - environment_key: default
          spec:
            environment_version: '2'

  schemas:
    taxi_mlops_schema:
      name: ${var.schema}
      catalog_name: ${var.catalog}
      comment: "Schema created by Databricks Asset Bundles"

  experiments:
    taxi_mlops_experiment:
      name: ${var.experiment_name}

  registered_models:
    nyctaxi_model:
      catalog_name: ${var.catalog}
      schema_name: ${var.schema}
      name: nyctaxi_model
      comment: Registered model in Unity Catalog for ${bundle.target} deployment target


